language: br

clan:
  tag-min-length: 2
  tag-max-length: 6
  name-min-length: 3
  name-max-length: 32
  initial-max-members: 10
  absolute-max-members: 40
  initial-chest-size: 9
  creation-cost: 1000.0
  require-coins-to-create: true

upgrades:
  member-slot-price: 5000.0
  chest-slot-price: 3000.0
  chest-slot-size: 9
  # Inventarios do Bukkit so aceitam multiplos de 9 ate 54 (6 fileiras), nao aumentar sem checar isso no codigo
  chest-slot-max: 54

ranking:
  update-interval-minutes: 30

kills:
  weight-rival: 3.0
  weight-aliado: 0.0
  weight-neutro: 1.0
  weight-civil: 1.0
  # Multiplicador extra aplicado ao peso do kill quando os dois clas estao em guerra ativa
  # (/clan guerra iniciar). Ex: kill de rival em guerra vale weight-rival * war-weight-multiplier.
  war-weight-multiplier: 1.5
  block-damage-same-clan: true
  block-damage-allies: true

inactivity:
  # Cla sem nenhuma acao relevante (chat, kill, boletim, deposito, etc) ha mais desses dias e
  # desfeito automaticamente. 0 ou negativo desliga a limpeza automatica.
  clan-purge-days: 60
  # De quanto em quanto tempo (horas) o servidor verifica se tem cla inativo pra desfazer.
  check-interval-hours: 24

moderation:
  # Lista de palavras banidas em tag/nome/descricao do cla (comparacao sem acento, sem
  # diferenciar maiuscula/minuscula, por substring). Vazio por padrao - preencha com o
  # que fizer sentido pro seu servidor.
  banned-words: []
  # Tempo de espera (segundos) depois de desfazer um clã antes de poder criar outro,
  # evita o ciclo criar/desfazer repetido pra farmar nome/tag.
  recreate-cooldown-seconds: 300

leveling:
  # XP ganho pelo cla a cada ponto de peso de kill (kill de rival com peso 3.0 da 3.0 * isto de XP).
  xp-per-weighted-kill: 10.0
  # Custo linear de XP por nivel: nivel 2 custa isto, nivel 3 custa o dobro, etc.
  xp-per-level: 200
  # Slots de membro extra GRATIS (sem custar do banco) que o cla ganha a cada nivel subido.
  member-bonus-per-level: 1

nametag:
  # Colore o nome do jogador (acima da cabeca e na tablist) de acordo com a relacao do cla de
  # quem esta vendo. Usa Scoreboard/Team nativo do Bukkit, um scoreboard proprio por jogador
  # (nao mexe no scoreboard principal do servidor nem em objetivos de outros plugins).
  enabled: true
  # De quanto em quanto tempo (segundos) o time de cada jogador e recalculado. Nao precisa ser
  # instantaneo (e so cor de nome), um intervalo curto ja da a sensacao de tempo real sem
  # sobrecarregar o servidor recalculando a cada evento de cla/relacao/guerra.
  refresh-interval-seconds: 3
  color-self: aqua
  color-ally: green
  color-rival: red
  color-war: dark_red
  color-neutral: white
  color-no-clan: gray

sidebar:
  # Scoreboard lateral opcional (cada jogador liga por conta propria em /clan alternar sidebar
  # ou pela GUI de preferencias) com os membros do cla online. Desligado por padrao para nao
  # conflitar com scoreboards de outros plugins do servidor sem o dono pedir.
  enabled-by-default: false
  title: "&6&lMeu Clã"

language: br

clan:
  tag-min-length: 2
  tag-max-length: 6
  name-min-length: 3
  name-max-length: 32
  initial-max-members: 10
  absolute-max-members: 40
  initial-chest-size: 9
  creation-cost: 1000.0
  require-coins-to-create: true

upgrades:
  member-slot-price: 5000.0
  chest-slot-price: 3000.0
  chest-slot-size: 9
  # Inventarios do Bukkit so aceitam multiplos de 9 ate 54 (6 fileiras), nao aumentar sem checar isso no codigo
  chest-slot-max: 54

ranking:
  update-interval-minutes: 30

kills:
  weight-rival: 3.0
  weight-aliado: 0.0
  weight-neutro: 1.0
  weight-civil: 1.0
  # Multiplicador extra aplicado ao peso do kill quando os dois clas estao em guerra ativa
  # (/clan guerra iniciar). Ex: kill de rival em guerra vale weight-rival * war-weight-multiplier.
  war-weight-multiplier: 1.5
  block-damage-same-clan: true
  block-damage-allies: true

inactivity:
  clan-purge-days: 60

moderation:
  # Lista de palavras banidas em tag/nome/descricao do cla (comparacao sem acento, sem
  # diferenciar maiuscula/minuscula, por substring). Vazio por padrao - preencha com o
  # que fizer sentido pro seu servidor.
  banned-words: []
  # Tempo de espera (segundos) depois de desfazer um clã antes de poder criar outro,
  # evita o ciclo criar/desfazer repetido pra farmar nome/tag.
  recreate-cooldown-seconds: 300
